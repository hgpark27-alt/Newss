name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject cache-busting version
        run: |
          VER=$(date +%Y%m%d%H%M%S)
          sed -i "s/style\.css\"/style.css?v=${VER}\"/g" mobile.html
          sed -i "s/app\.js\"/app.js?v=${VER}\"/g"       mobile.html
          sed -i "s/pc-app\.js\"/pc-app.js?v=${VER}\"/g" pc.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
