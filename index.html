<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SEMI">
<title>반도체 뉴스 인텔리전스</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=3">
<link rel="apple-touch-icon" href="favicon.svg?v=3">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Ticker ── -->
<div class="ticker-wrap" id="tickerWrap"></div>

<!-- ── Nav ── -->
<nav class="nav">
  <a class="nav-brand" href="#">
    <div class="nav-logo">
      <svg width="18" height="18" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M26 26 A13 13 0 1 0 10 26 Z" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
        <circle cx="18" cy="17" r="6" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.4"/>
        <circle cx="18" cy="17" r="2.5" fill="white"/>
      </svg>
    </div>
    <div>
      <div class="nav-name">SEMI</div>
      <div class="nav-sub">인텔리전스</div>
    </div>
  </a>
  <div class="nav-divider"></div>
  <div class="status-wrap">
    <div class="status-dot"></div>
    <span id="statusText">로딩 중...</span>
  </div>
  <div class="nav-spacer"></div>
  <button class="btn-icon" id="btnReport" title="일일 리포트">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2.5" y="1.5" width="10" height="12" rx="1.5"/>
      <line x1="5" y1="5.5" x2="10" y2="5.5"/>
      <line x1="5" y1="7.75" x2="10" y2="7.75"/>
      <line x1="5" y1="10" x2="8" y2="10"/>
    </svg>
  </button>
  <button class="btn-icon" id="btnSettings" title="설정">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
      <line x1="2" y1="4"   x2="13" y2="4"/>
      <circle cx="9.5" cy="4"   r="1.5" fill="currentColor" stroke="none"/>
      <line x1="2" y1="7.5" x2="13" y2="7.5"/>
      <circle cx="5.5" cy="7.5" r="1.5" fill="currentColor" stroke="none"/>
      <line x1="2" y1="11"  x2="13" y2="11"/>
      <circle cx="10" cy="11"  r="1.5" fill="currentColor" stroke="none"/>
    </svg>
  </button>
</nav>

<!-- ── Main ── -->
<div class="main">

  <div class="banner crash" id="crashBanner"></div>

  <!-- 통계 바 -->
  <div class="stats-bar" id="statsBar">
    <span class="stat">로딩 중...</span>
  </div>

  <!-- 주가 스트립 -->
  <div class="market-strip" id="marketStrip"></div>

  <!-- 주요 기사 -->
  <div class="featured" id="featured"></div>

  <!-- 섹터 칩 -->
  <div class="chip-bar" id="chipBar">
    <button class="chip active" data-seg="">전체</button>
    <button class="chip" data-seg="Foundry">파운드리</button>
    <button class="chip" data-seg="Equipment">장비/소재</button>
    <button class="chip" data-seg="Memory">메모리</button>
    <button class="chip" data-seg="Logic">설계/로직</button>
    <button class="chip" data-seg="Materials">소재</button>
  </div>

  <!-- 필터 -->
  <div class="filter-bar">
    <span class="filter-label">필터</span>
    <select class="filter-select" id="fReg">
      <option value="">전체 지역</option>
      <option value="US">미국</option>
      <option value="Korea">한국</option>
      <option value="Taiwan">대만</option>
      <option value="Japan">일본</option>
      <option value="China">중국</option>
      <option value="Europe">유럽</option>
    </select>
    <select class="filter-select" id="fImp">
      <option value="">전체 중요도</option>
      <option value="high">● 고중요</option>
      <option value="medium">● 중간</option>
      <option value="normal">○ 낮음</option>
    </select>
    <input type="text" class="filter-search" id="fSearch" placeholder="키워드 검색...">
    <span class="filter-count" id="fCount"></span>
  </div>

  <!-- 뉴스 리스트 -->
  <div class="news-list" id="newsGrid">
    <div class="empty"><div class="ico">⏳</div><p>뉴스를 불러오는 중...</p></div>
  </div>

</div>

<!-- ── 설정 모달 ── -->
<div class="overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-head">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" style="flex-shrink:0;opacity:.5">
        <line x1="2" y1="4"   x2="13" y2="4"/>
        <circle cx="9.5" cy="4"   r="1.5" fill="currentColor" stroke="none"/>
        <line x1="2" y1="7.5" x2="13" y2="7.5"/>
        <circle cx="5.5" cy="7.5" r="1.5" fill="currentColor" stroke="none"/>
        <line x1="2" y1="11"  x2="13" y2="11"/>
        <circle cx="10" cy="11"  r="1.5" fill="currentColor" stroke="none"/>
      </svg>
      <span class="modal-title">설정</span>
      <button class="modal-close" data-close="settingsModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="s-group">
        <label class="s-label">데이터 소스</label>
        <select class="s-input" id="sSrc">
          <option value="mock">샘플 데이터 (오프라인)</option>
          <option value="gnews">GNews API (실시간)</option>
        </select>
      </div>
      <div class="s-group" id="apiKeyGroup" style="display:none">
        <label class="s-label">GNews API Key</label>
        <input type="text" class="s-input" id="sApiKey" placeholder="API 키를 입력하세요...">
      </div>
      <div class="s-group">
        <label class="s-label">표시 설정</label>
        <div class="s-row">
          <div>
            <div class="s-row-label">한국어 우선 표시</div>
            <div class="s-row-sub">번역된 제목/요약을 먼저 표시합니다</div>
          </div>
          <label class="toggle"><input type="checkbox" id="sKoFirst" checked><span class="toggle-track"></span></label>
        </div>
        <div class="s-row">
          <div>
            <div class="s-row-label">고중요도 우선 정렬</div>
            <div class="s-row-sub">중요도 점수 기준 내림차순 정렬</div>
          </div>
          <label class="toggle"><input type="checkbox" id="sHighFirst" checked><span class="toggle-track"></span></label>
        </div>
      </div>
      <div class="s-group">
        <label class="s-label">이메일 리포트 구독</label>
        <input type="email" class="s-input" id="sEmail" placeholder="수신 이메일 주소">
        <div class="s-email-row">
          <button class="s-freq-btn active" data-freq="weekly">주간</button>
          <button class="s-freq-btn" data-freq="monthly">월간</button>
        </div>
        <button class="btn btn-subscribe" id="btnSubscribe">구독 설정 저장</button>
        <div class="s-subscribe-hint">매주 월요일 오전 8시 · 반도체 주간 브리핑 발송</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost"   data-close="settingsModal">취소</button>
      <button class="btn btn-primary" id="btnSave">저장 및 새로고침</button>
    </div>
  </div>
</div>

<!-- ── 리포트 모달 ── -->
<div class="overlay" id="reportModal">
  <div class="modal wide">
    <div class="modal-head">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:.5">
        <rect x="2.5" y="1.5" width="10" height="12" rx="1.5"/>
        <line x1="5" y1="5.5" x2="10" y2="5.5"/>
        <line x1="5" y1="7.75" x2="10" y2="7.75"/>
        <line x1="5" y1="10" x2="8" y2="10"/>
      </svg>
      <span class="modal-title">일일 반도체 시장 인텔리전스 리포트</span>
      <button class="modal-close" data-close="reportModal">✕</button>
    </div>
    <div class="modal-body" id="reportBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost"   data-close="reportModal">닫기</button>
      <button class="btn btn-primary" id="btnPrint">PDF 저장</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
